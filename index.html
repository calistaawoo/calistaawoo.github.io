  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #e8f4fc;
      font-family: 'Space Mono', monospace;
      color: #2b5fa6;

    .container {

    }

    h1 {
      font-size: 2.4rem;
      font-weight: 400;
      margin-bottom: 0.6rem;
      letter-spacing: 0.04em;
    }

    p {
      font-size: 1rem;
      font-style: italic;
      color: #6db8e8;
      letter-spacing: 0.06em;

<body>
  <div class="container">

</html>
