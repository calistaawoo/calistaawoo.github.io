<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calista Woo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f7f3ee;
      font-family: 'DM MOno', monospace;
      color: #2b5fa6;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 0.6rem;
      color: #1a3a6b;
    }

    p {
      font-size: 1rem;
      font-style: italic;
      color: #6db8e8;
      letter-spacing: 0.06em;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #6db8e8;
      border-radius: 50%;
      margin: 1.2rem auto 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>calista woo</h1>
    <p>something is coming</p>
    <div class="dot"></div>
  </div>
</body>
</html>
